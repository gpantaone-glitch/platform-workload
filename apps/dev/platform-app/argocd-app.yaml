apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: platform-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/gpantaone-glitch/platform-workload
    targetRevision: main
    path: base/app
    helm:
      valueFiles:
        - ../../../apps/dev/platform-app/values-override.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
